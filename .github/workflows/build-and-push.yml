name: Build and Push

permissions:
  contents: read
  packages: write

on:
  workflow_call:
    inputs:
      image_tag:
        description: "Optional image tag override"
        required: false
        type: string
    outputs:
      tease_image_tag:
        description: "The pushed image tag for the tease image"
        value: ${{ jobs.build-and-push.outputs.image_tag }}

jobs:
  build-and-push:
    strategy:
      matrix:
        include:
          - image-name: prompt-edu/tease-client
            docker-file: ./client-react/Dockerfile
            docker-context: ./client-react
          - image-name: prompt-edu/tease-server
            docker-file: ./server-go/Dockerfile
            docker-context: ./server-go
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@v1.2.0
    secrets: inherit
    with:
      image-name: ${{ matrix.image-name }}
      docker-file: ${{ matrix.docker-file }}
      docker-context: ${{ matrix.docker-context }}
      tags: ${{ inputs.image_tag }}
